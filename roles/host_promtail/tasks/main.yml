---
- name: Check if promtail is running
  ansible.builtin.command:
    cmd: systemctl status promtail
  register: promtail_status
  changed_when: false
  failed_when: false

- name: Install promtail
  when: promtail_status.rc != 0
  import_tasks: install.yml

- name: Ensure Promtail data directory exists
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    owner: root
    group: root
    mode: "0640"

- name: Deploy Promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and start Promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted
    enabled: true
    daemon_reload: true
