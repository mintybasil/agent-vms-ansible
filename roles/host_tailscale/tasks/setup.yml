---
- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Download Tailscale APT repository file
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.tailscale-keyring.list
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: '0644'

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Ensure Tailscale is started and enabled
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true
    daemon_reload: true

- name: Join Tailscale with auth key
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_auth_key }} {{ tailscale_up_extra_args }}"
  register: tailscale_up
  changed_when: "'Success' in tailscale_up.stdout or tailscale_up.rc == 0"
  no_log: true
