---
- name: Ensure libvirt images directory exists
  ansible.builtin.file:
    path: "{{ vm_image_dir | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# The base cloud image is downloaded once and re-used — each VM gets its own copy.
- name: Check if Debian cloud image exists
  ansible.builtin.stat:
    path: "{{ vm_image_dir }}/{{ vm_debian_cloud_image }}"
  register: cloud_image_stat

- name: Fetch Debian cloud image
  ansible.builtin.get_url:
    url: "{{ vm_debian_cloud_image_url }}"
    dest: "{{ vm_image_dir }}"
  when: not cloud_image_stat.stat.exists

# ── Per-VM provisioning ────────────────────────────────────────────────────────

- name: Deploy each VM
  ansible.builtin.include_tasks: deploy_vm.yml
  loop: "{{ vms }}"
  loop_control:
    loop_var: vm
    label: "{{ vm.name }}"
