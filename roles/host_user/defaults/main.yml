---
# Whether to manage a non-root administrative user on the host.
# When false, this role does nothing.
host_user_manage: false

# Name of the non-root administrative user to create on the host.
# This defaults to "admin" but can be overridden in group_vars.
host_user: admin

# When true, copy /root/.ssh/authorized_keys to the new user's account
# so you can immediately log in with the same SSH key.
host_user_copy_root_authorized_keys: true

