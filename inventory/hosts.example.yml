all:
  hosts:
    openclaw-host:
      ansible_host: "" # IP or hostname of the KVM host
      ansible_user: "{{ host_user }}"
      host_user: "admin" # Host user, optionally created
      host_user_manage: false
      host_ssh_port: 6969 # Optional, port will be changed to this value
#     Promtail: push to Loki or HTTP endpoint.
      promtail_enabled: false
#     promtail_loki_url: ""
#     promtail_basic_auth_user: ""
#     promtail_basic_auth_password: ""

  # One entry per VM. Add more hosts here for multiple VMs.
  # ansible_host should be the Tailscale IP/hostname after initial provisioning.
  openclaw_vms:
    hosts:
      openclaw-vm-1:
        ansible_host: "" # Tailscale IP or MagicDNS hostname
        ansible_user: "debian" # Default user
        caddy_basicauth_user:
        # Use `caddy hash-password` - https://caddyserver.com/docs/command-line#caddy-hash-password
        caddy_basicauth_hash:

#        openclaw-vm-2:
