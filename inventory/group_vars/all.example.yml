# SSH hardening (host_setup tag: ssh_hardening). Apply after non-root user works.
# ssh_permit_root_login: "no"   # no, prohibit-password, or yes
# ssh_password_authentication: "no"

# VM definitions — one entry per VM.
vms:
  - name: openclaw-vm-1
    ip: 192.168.122.10          # Static IP on libvirt NAT network (must be 192.168.122.*)
    user: debian
    ssh_public_key: "ssh-ed25519 ..."
    disk_size: 20G              # optional, default: 20G
    memory_mib: 4096            # optional, default: 4096
    vcpus: 4                    # optional, default: 4
    network_iface: enp1s0       # optional, default: enp1s0


  # Uncomment to add a second VM:
  # - name: openclaw-vm-2
  #   ip: 192.168.122.11
  #   user: debian
  #   ssh_public_key: "ssh-ed25519 ..."
  #   disk_size: 20G
  #   memory_mib: 4096
  #   vcpus: 4
  #   network_iface: enp1s0
