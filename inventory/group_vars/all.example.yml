host_user:
host_ssh_port: 22 # Strongly recommend changing this

# Promtail: push to Loki or HTTP endpoint.
promtail_enabled: false
# promtail_loki_url:
# promtail_basic_auth_user: ""
# promtail_basic_auth_password: ""

# Default OS user provisioned inside each VM via cloud-init.
vm_vm_user: debian

# VM definitions — one entry per VM.
# The base Debian cloud image is downloaded once; each VM gets its own disk copy.
# The shared libvirt pool and default NAT network support multiple VMs without changes.
#
# Pass tailscale_auth_key at runtime: -e tailscale_auth_key=<key>
# Use ephemeral one-time keys (not reusable) for security.
vms:
  - name: openclaw-vm-1
    ip: 192.168.122.10          # Static IP on libvirt NAT network
    ssh_public_key: "ssh-ed25519 ..."
    disk_size: 20G              # optional, default: 20G
    memory_mib: 4096            # optional, default: 4096
    vcpus: 4                    # optional, default: 4
    network_iface: enp1s0       # optional, default: enp1s0

  # Uncomment to add a second VM:
  # - name: openclaw-vm-2
  #   ip: 192.168.122.11
  #   ssh_public_key: "ssh-ed25519 ..."
  #   disk_size: 20G
  #   memory_mib: 4096
  #   vcpus: 4
  #   network_iface: enp1s0

caddy_basicauth_user:
# Use `caddy hash-password` - https://caddyserver.com/docs/command-line#caddy-hash-password
caddy_basicauth_hash:
